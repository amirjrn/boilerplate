services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run start:dev
    restart: always
    ports:
      - '3000:3000'
      - '9229:9229' # Debugging port
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:15
    restart: always
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-ls2025}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
